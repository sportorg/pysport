name: Release

on:
  push:
    branches: [ 'workflows/release' ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Release
    strategy:
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      - name: Install python dependencies
        run: pip install poetry && poetry install -E win
      - name: Build
        run: python builder.py build
